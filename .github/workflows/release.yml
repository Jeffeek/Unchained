name: Release Package

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.2.3, v1.0.0-preview.1
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build, pack, and run but skip the NuGet push."
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-progress release

env:
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  # ---------------------------------------------------------------
  # 1. Extract the version from the tag.
  # ---------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
      tag: ${{ steps.get.outputs.tag }}
      is_prerelease: ${{ steps.get.outputs.is_prerelease }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - id: get
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Dry-run: no tag pushed, use a sentinel version so downstream steps
            # can still build and pack without publishing.
            echo "version=0.0.0-dry-run" >> "$GITHUB_OUTPUT"
            echo "tag=dry-run" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Dry-run mode — version set to 0.0.0-dry-run"
            exit 0
          fi
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION"

  # ---------------------------------------------------------------
  # 2. Build + test on every RID and upload native binaries.
  # ---------------------------------------------------------------
  verify:
    needs: version
    uses: ./.github/workflows/_build-test-all.yml
    with:
      coverage: false
      upload-natives: true
      fail-fast: true
    secrets: inherit

  # ---------------------------------------------------------------
  # 3. Pack with binaries.
  # ---------------------------------------------------------------
  pack:
    needs: [version, verify]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # linux-arm64 is the ONLY RID whose native FreeType2 binary must be staged
      # into the package — every other platform is bundled by FreeTypeSharp, so the
      # verify matrix gates the upload to linux-arm64 (see _build-test.yml). Download
      # that single artifact by name, straight into the runtimes/<rid>/native dir the
      # package expects. (A named download extracts directly to `path`, with no
      # per-artifact subdirectory.)
      - name: Stage linux-arm64 native under runtimes/linux-arm64/native/
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: natives-linux-arm64
          path: src/Unchained.Drawing.Runtimes/runtimes/linux-arm64/native

      - name: Setup .NET (restore, no build)
        uses: ./.github/actions/dotnet-setup
        with:
          build: 'false'

      - name: Pack all packages
        shell: bash
        timeout-minutes: 20
        run: |
          set -euo pipefail
          dotnet pack Unchained.slnx \
            -c Release --output "./artifacts/nupkg" \
            -p:PackageVersion="${{ needs.version.outputs.version }}"

      - name: Inspect pack contents
        shell: bash
        run: |
          set -euo pipefail
          for nupkg in artifacts/nupkg/*.nupkg; do
            echo "=== $nupkg ==="
            unzip -l "$nupkg" | grep -E "lib/|runtimes/" || true
            unzip -p "$nupkg" "*.nuspec" 2>/dev/null | grep -E "<dependency|<id>|<version>" || true
          done

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg
          path: ./artifacts/nupkg

  # ---------------------------------------------------------------
  # 4. GitHub Release + nuget.org push (gated on every check).
  # ---------------------------------------------------------------
  publish:
    name: Publish to NuGet.org
    needs: [version, pack]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment:
      name: nuget
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup .NET (SDK only)
        uses: ./.github/actions/dotnet-setup
        with:
          restore: 'false'
          build: 'false'

      - name: Download nupkg
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nupkg
          path: artifacts/nupkg

      - name: List artifacts
        run: ls -la ./artifacts/nupkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: ./artifacts/nupkg/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload nupkg to workflow artifacts (30-day retention)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages-${{ needs.version.outputs.version }}
          path: ./artifacts/nupkg/*.nupkg
          retention-days: 30

      - name: Publish to nuget.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: >
          dotnet nuget push "./artifacts/nupkg/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
