name: CodeQL Security Analysis

on:
  workflow_call:        # Called from ci.yml after quick-gate passes
  workflow_dispatch:    # Manual trigger
  schedule:
    - cron: '0 0 * * 1'  # Weekly — Monday 00:00 UTC

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: csharp
          # security-extended adds rules tuned for unsafe P/Invoke and marshalling.
          queries: security-and-quality,security-extended
          config: |
            paths:
              - src
            paths-ignore:
              - tests
              - "**/bin/**"
              - "**/obj/**"

      - name: Setup .NET (restore only — CodeQL performs the build)
        uses: ./.github/actions/dotnet-setup
        with:
          build: 'false'

      - name: Build for CodeQL analysis
        run: dotnet build -c Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:csharp"
