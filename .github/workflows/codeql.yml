name: CodeQL Security Analysis

on:
  workflow_call:        # Called from ci.yml after quick-gate passes
  workflow_dispatch:    # Manual trigger
  schedule:
    - cron: '0 0 * * 1'  # Weekly — Monday 00:00 UTC

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          # security-extended adds rules tuned for unsafe P/Invoke and marshalling.
          queries: security-and-quality,security-extended
          config: |
            paths:
              - src
            paths-ignore:
              - tests
              - "**/bin/**"
              - "**/obj/**"

      - name: Setup .NET (restore only — CodeQL performs the build)
        uses: ./.github/actions/dotnet-setup
        with:
          build: 'false'

      - name: Build for CodeQL analysis
        run: dotnet build -c Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
