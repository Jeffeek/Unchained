name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "master"
      - "release/**"
  push:
    branches:
      - "master"
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. Quick gate — fast linux-x64 smoke test.
  #    Full matrix and CodeQL only run if this passes.
  # ---------------------------------------------------------------
  quick-gate:
    name: Quick Test (linux-x64)
    uses: ./.github/workflows/_build-test.yml
    with:
      runner: ubuntu-latest
      rid: linux-x64
      coverage: false

  # ---------------------------------------------------------------
  # 2. Full matrix — all platforms, with coverage upload.
  # ---------------------------------------------------------------
  full-matrix:
    name: Build & Test (all platforms)
    needs: quick-gate
    uses: ./.github/workflows/_build-test-all.yml
    with:
      coverage: true
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------
  # 3. CodeQL — runs in parallel with the full matrix.
  # ---------------------------------------------------------------
  codeql:
    name: CodeQL Security Analysis
    needs: quick-gate
    permissions:
      security-events: write
      actions: read
      contents: read
    uses: ./.github/workflows/codeql.yml
